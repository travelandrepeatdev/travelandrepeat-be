name: CI/CD API Java 17 - Deploy to VPS

on:
  push:
    branches:
      - 'release/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout
      - uses: actions/checkout@v4

      # Set up Java 17
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Build Spring Boot
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # Generate version tags
      - name: Generate version tags
        id: vars
        run: |
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      # Login to GHCR
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      # (Opcional) Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ github.repository_owner }}
          password: ${{ secrets.DOCKERHUB_USERNAME_FORGITHUB }}

      # Build & Push Docker image
      - name: Build & Push Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/travelandrepeat-be:latest
            ghcr.io/${{ github.repository_owner }}/travelandrepeat-be:${{ env.SHORT_SHA }}
            ${{ github.repository_owner }}/travelandrepeat-be:latest

      # Deploy to VPS
      - name: Deploy API to VPS via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            IMAGE=ghcr.io/${{ github.repository_owner }}/travelandrepeat-be:${{ env.SHORT_SHA }}
            
            echo "== Login to GHCR =="
            echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin

            echo "== Pulling latest API image =="
            docker pull $IMAGE

            echo "== Stopping old container =="
            docker stop tyr-be || true

            echo "== Removing old container =="
            docker rm tyr-be || true

            echo "== Hard reset container =="
            docker image prune -af

            echo "== Starting new API container =="
            docker run -d \
              --name tyr-be \
              --restart unless-stopped \
              -p 8080:8080 \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e MAIL_AGENT_TO=${{ secrets.MAIL_AGENT_TO }} \
              -e MAIL_QUOTATION_FROM=${{ secrets.MAIL_QUOTATION_FROM }} \
              -e MAIL_HOST=${{ secrets.MAIL_HOST }} \
              -e MAIL_PORT=587 \
              -e MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }} \
              -e CORS_ALLOWED_ORIGINS=${{ secrets.CORS_ALLOWED_ORIGINS }} \
              -e RECAPTCHA_SECRET=${{ secrets.RECAPTCHA_SECRET }} \
              -e DB_URL=${{ secrets.DB_URL }} \
              -e DB_USER=${{ secrets.DB_USER }} \
              -e DB_PASS=${{ secrets.DB_PASS }} \
              -e BANXICO_TOKEN=${{ secrets.BANXICO_TOKEN }} \
              -e JWT_SECRET=${{ secrets.JWT_SECRET }} \
              $IMAGE

            echo "== API Deployment completed successfully =="
