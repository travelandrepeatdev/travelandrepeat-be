server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: travelandrepeat-be
  profile: prod
  mail:
    host: ${MAIL_HOST}
    port: 587
    username: ${MAIL_QUOTATION_FROM}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          ssl:
            trust: ${MAIL_HOST}
          connectiontimeout: 5000

# Agent Mail
mail:
  agent-to: ${MAIL_AGENT_TO}
  quotation-from: ${MAIL_QUOTATION_FROM}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}
  allowed-methods: GET, POST, PUT, DELETE, OPTIONS
  allowed-headers: "*"
  allow-credentials: false

google:
  recaptcha:
    secret: ${RECAPTCHA_SECRET}
    verify-url: https://www.google.com/recaptcha/api/siteverify

banxico:
  api-url: "https://www.banxico.org.mx/SieAPIRest/service/v1/series/SF43718/datos/oportuno"
  token: ${BANXICO_TOKEN}

# expose health and info endpoints over HTTP
management:
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    show-details: always

logging:
  level:
    root: WARN
