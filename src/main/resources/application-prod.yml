server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: travelandrepeat-be
  mail:
    host: ${MAIL_HOST}
    port: 587
    username: ${MAIL_QUOTATION_FROM}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          ssl:
            trust: ${MAIL_HOST}
          connectiontimeout: 5000

# Agent Mail
mail:
  agent-to: ${MAIL_AGENT_TO}
  quotation-from: ${MAIL_QUOTATION_FROM}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}
  allowed-methods: GET, POST, PUT, DELETE, OPTIONS
  allowed-headers: "*"
  allow-credentials: false

google:
  recaptcha:
    secret: ${RECAPTCHA_SECRET}
    verify-url: ${RECAPTCHA_VERIFY_URL}

# expose health and info endpoints over HTTP
management:
  endpoints:
    web:
    exposure:
    include: health,info
    health:
      show-details: always

logging:
  level:
    root: WARN
